<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixine — Pokemon Coloring Book</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #16213e;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 2px solid #0f3460;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.4rem;
      color: #e94560;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    header h1 span { color: #fff; }

    .search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      max-width: 340px;
    }

    .search-wrap input {
      flex: 1;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid #0f3460;
      background: #0f3460;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
    }

    .search-wrap input:focus { border-color: #e94560; }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 200px;
      background: #16213e;
      border-right: 2px solid #0f3460;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      padding: 8px 10px 4px;
    }

    #pokemon-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 6px;
    }

    #pokemon-list::-webkit-scrollbar { width: 4px; }
    #pokemon-list::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }

    .poke-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 6px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.15s;
      text-transform: capitalize;
    }

    .poke-item:hover { background: #0f3460; }
    .poke-item.active { background: #e94560; color: #fff; }

    .poke-item .num {
      font-size: 0.65rem;
      color: #666;
      width: 28px;
      text-align: right;
    }

    .poke-item.active .num { color: #ffaabb; }

    /* ── Canvas area ── */
    .canvas-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: #12122a;
    }

    #canvas-wrap {
      position: relative;
      cursor: crosshair;
      image-rendering: pixelated;
    }

    #main-canvas {
      display: block;
      image-rendering: pixelated;
      border: 2px solid #0f3460;
    }

    .canvas-hint {
      position: absolute;
      bottom: 12px;
      font-size: 0.75rem;
      color: #555;
      pointer-events: none;
    }

    #loading-msg {
      position: absolute;
      font-size: 1rem;
      color: #888;
    }

    /* ── Right panel ── */
    .panel {
      width: 180px;
      background: #16213e;
      border-left: 2px solid #0f3460;
      display: flex;
      flex-direction: column;
      gap: 0;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .panel::-webkit-scrollbar { width: 4px; }
    .panel::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }

    .panel-section {
      padding: 10px;
      border-bottom: 1px solid #0f3460;
    }

    .panel-section label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 8px;
    }

    /* Tools */
    .tools {
      display: flex;
      gap: 6px;
    }

    .tool-btn {
      flex: 1;
      padding: 7px 4px;
      border: 1px solid #0f3460;
      border-radius: 6px;
      background: #0f3460;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      position: relative;
    }

    .tool-btn:hover { border-color: #e94560; color: #fff; }
    .tool-btn.active { background: #e94560; border-color: #e94560; color: #fff; }

    .tool-btn .tip {
      display: block;
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* Color picker */
    #color-input {
      width: 100%;
      height: 40px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: none;
      padding: 0;
    }

    /* Palette */
    .palette {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
    }

    .swatch {
      aspect-ratio: 1;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.1s, border-color 0.1s;
    }

    .swatch:hover { transform: scale(1.15); }
    .swatch.selected { border-color: #fff; }

    /* Brush size */
    .brush-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brush-row input[type=range] {
      flex: 1;
      accent-color: #e94560;
    }

    .brush-row span {
      font-size: 0.75rem;
      width: 20px;
      text-align: right;
      color: #aaa;
    }

    /* Action buttons */
    .action-btn {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #0f3460;
      background: #0f3460;
      color: #ccc;
      font-size: 0.8rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      margin-top: 6px;
    }

    .action-btn:first-child { margin-top: 0; }
    .action-btn:hover { border-color: #e94560; color: #fff; background: #1a2a4a; }

    .action-btn.danger:hover { background: #5a1020; border-color: #e94560; }

    /* Zoom info */
    .zoom-label {
      font-size: 0.7rem;
      color: #555;
      text-align: center;
      padding: 4px 0 0;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .sidebar { width: 130px; }
      .panel { width: 140px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Pixi<span>ne</span></h1>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search Pokemon…" autocomplete="off" />
  </div>
</header>

<div class="main">

  <!-- Sidebar: Pokemon list -->
  <aside class="sidebar">
    <div class="sidebar-label">Pokemon (#1–1025)</div>
    <div id="pokemon-list"></div>
  </aside>

  <!-- Center: Canvas -->
  <section class="canvas-area">
    <div id="loading-msg">Select a Pokemon to start coloring!</div>
    <div id="canvas-wrap" style="display:none">
      <canvas id="main-canvas"></canvas>
    </div>
    <div class="canvas-hint">Click to fill • Right-click to pick color • Scroll to zoom</div>
  </section>

  <!-- Right panel: Tools -->
  <aside class="panel">

    <div class="panel-section">
      <label>Tool</label>
      <div class="tools">
        <div class="tool-btn active" id="tool-fill" title="Flood fill" onclick="setTool('fill')">
          🪣<span class="tip">Fill</span>
        </div>
        <div class="tool-btn" id="tool-brush" title="Brush" onclick="setTool('brush')">
          🖌️<span class="tip">Brush</span>
        </div>
        <div class="tool-btn" id="tool-eraser" title="Eraser" onclick="setTool('eraser')">
          ⬜<span class="tip">Erase</span>
        </div>
      </div>
    </div>

    <div class="panel-section">
      <label>Brush Size</label>
      <div class="brush-row">
        <input type="range" id="brush-size" min="1" max="12" value="1" />
        <span id="brush-size-label">1</span>
      </div>
    </div>

    <div class="panel-section">
      <label>Color</label>
      <input type="color" id="color-input" value="#e94560" />
    </div>

    <div class="panel-section">
      <label>Palette</label>
      <div class="palette" id="palette"></div>
    </div>

    <div class="panel-section">
      <label>Actions</label>
      <button class="action-btn" onclick="downloadCanvas()">⬇ Save PNG</button>
      <button class="action-btn" onclick="undoAction()">↩ Undo</button>
      <button class="action-btn danger" onclick="clearCanvas()">✕ Clear Colors</button>
    </div>

    <div class="panel-section">
      <label>Zoom</label>
      <div class="brush-row">
        <input type="range" id="zoom-slider" min="2" max="16" value="6" />
        <span id="zoom-label">6×</span>
      </div>
    </div>

  </aside>
</div>

<script>
// ─────────────────────────────────────────────
// Config
// ─────────────────────────────────────────────
const TOTAL_POKEMON = 1025;
const SPRITE_BASE = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/';

const PALETTE_COLORS = [
  '#ffffff','#f5f5dc','#ffe0b2','#ffcc80','#ffe082',
  '#fff176','#c5e1a5','#a5d6a7','#80cbc4','#80deea',
  '#90caf9','#ce93d8','#f48fb1','#ef9a9a','#bcaaa4',
  '#b0bec5','#ffd54f','#ff8a65','#e57373','#64b5f6',
  '#81c784','#4db6ac','#4dd0e1','#7986cb','#ba68c8',
  '#f06292','#ff7043','#ffca28','#26c6da','#42a5f5',
  '#9ccc65','#26a69a','#ab47bc','#ec407a','#ef5350',
  '#000000','#424242','#616161','#757575','#9e9e9e',
];

// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let currentTool = 'fill';
let currentColor = '#e94560';
let brushSize = 1;
let zoomLevel = 6;
let currentPokemonId = null;
let pixelData = null;       // Uint8ClampedArray of scaled canvas
let outlineData = null;     // original B&W pixel data (scaled)
let canvasW = 0, canvasH = 0;
let undoStack = [];
const MAX_UNDO = 30;

const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');

// ─────────────────────────────────────────────
// Build Pokemon list
// ─────────────────────────────────────────────
const listEl = document.getElementById('pokemon-list');
const allItems = [];

for (let i = 1; i <= TOTAL_POKEMON; i++) {
  const div = document.createElement('div');
  div.className = 'poke-item';
  div.dataset.id = i;
  div.innerHTML = `<span class="num">#${i}</span><span class="name">${pokeName(i)}</span>`;
  div.addEventListener('click', () => loadPokemon(i));
  listEl.appendChild(div);
  allItems.push(div);
}

function pokeName(id) {
  return `pokemon-${id}`;
}

// Fetch all names async and update
async function loadAllNames() {
  try {
    const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025&offset=0');
    const data = await res.json();
    data.results.forEach((p, i) => {
      const item = allItems[i];
      if (item) item.querySelector('.name').textContent = p.name;
    });
  } catch (e) {
    // silently fail — numeric names still work
  }
}

loadAllNames();

// Search
document.getElementById('search').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase().trim();
  allItems.forEach(item => {
    const name = item.querySelector('.name').textContent.toLowerCase();
    const num = item.dataset.id;
    item.style.display = (!q || name.includes(q) || num.includes(q)) ? '' : 'none';
  });
});

// ─────────────────────────────────────────────
// Load & process Pokemon sprite
// ─────────────────────────────────────────────
async function loadPokemon(id) {
  currentPokemonId = id;
  undoStack = [];

  // Highlight active
  allItems.forEach(el => el.classList.toggle('active', +el.dataset.id === id));
  allItems[id - 1]?.scrollIntoView({ block: 'nearest' });

  const loadingEl = document.getElementById('loading-msg');
  const wrapEl = document.getElementById('canvas-wrap');
  loadingEl.textContent = 'Loading sprite…';
  loadingEl.style.display = '';
  wrapEl.style.display = 'none';

  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = `${SPRITE_BASE}${id}.png`;

  img.onload = () => {
    processSprite(img);
    loadingEl.style.display = 'none';
    wrapEl.style.display = '';
  };

  img.onerror = () => {
    loadingEl.textContent = `No sprite found for #${id}`;
  };
}

function processSprite(img) {
  const scale = zoomLevel;
  const sw = img.naturalWidth;
  const sh = img.naturalHeight;

  // Draw original sprite to offscreen canvas to read pixels
  const off = document.createElement('canvas');
  off.width = sw;
  off.height = sh;
  const octx = off.getContext('2d');
  octx.drawImage(img, 0, 0);
  const srcData = octx.getImageData(0, 0, sw, sh).data;

  // Convert to B&W: transparent/very-light → white, else → black
  const bwCanvas = document.createElement('canvas');
  bwCanvas.width = sw;
  bwCanvas.height = sh;
  const bwCtx = bwCanvas.getContext('2d');
  const bwImg = bwCtx.createImageData(sw, sh);
  for (let i = 0; i < srcData.length; i += 4) {
    const r = srcData[i], g = srcData[i+1], b = srcData[i+2], a = srcData[i+3];
    const brightness = (r + g + b) / 3;
    // Transparent pixels → white
    if (a < 64) {
      bwImg.data[i]   = 255;
      bwImg.data[i+1] = 255;
      bwImg.data[i+2] = 255;
      bwImg.data[i+3] = 255;
    } else if (brightness > 200 && a < 180) {
      // Semi-transparent light → white
      bwImg.data[i]   = 255;
      bwImg.data[i+1] = 255;
      bwImg.data[i+2] = 255;
      bwImg.data[i+3] = 255;
    } else {
      // Opaque pixel → black
      bwImg.data[i]   = 0;
      bwImg.data[i+1] = 0;
      bwImg.data[i+2] = 0;
      bwImg.data[i+3] = 255;
    }
  }
  bwCtx.putImageData(bwImg, 0, 0);

  // Scale up to display canvas
  canvasW = sw * scale;
  canvasH = sh * scale;
  canvas.width = canvasW;
  canvas.height = canvasH;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(bwCanvas, 0, 0, canvasW, canvasH);

  // Store pixel data
  pixelData = ctx.getImageData(0, 0, canvasW, canvasH).data.slice();
  outlineData = pixelData.slice(); // keep original B&W
}

// ─────────────────────────────────────────────
// Tools
// ─────────────────────────────────────────────
function setTool(name) {
  currentTool = name;
  ['fill','brush','eraser'].forEach(t => {
    document.getElementById(`tool-${t}`).classList.toggle('active', t === name);
  });
}

// Brush size
document.getElementById('brush-size').addEventListener('input', e => {
  brushSize = +e.target.value;
  document.getElementById('brush-size-label').textContent = brushSize;
});

// Zoom
document.getElementById('zoom-slider').addEventListener('input', e => {
  zoomLevel = +e.target.value;
  document.getElementById('zoom-label').textContent = zoomLevel + '×';
  if (currentPokemonId) {
    // Reload with new zoom
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.src = `${SPRITE_BASE}${currentPokemonId}.png`;
    img.onload = () => processSprite(img);
  }
});

// Scroll to zoom
document.getElementById('canvas-wrap').addEventListener('wheel', (e) => {
  e.preventDefault();
  const slider = document.getElementById('zoom-slider');
  const delta = e.deltaY < 0 ? 1 : -1;
  slider.value = Math.max(2, Math.min(16, +slider.value + delta));
  slider.dispatchEvent(new Event('input'));
}, { passive: false });

// Color picker
document.getElementById('color-input').addEventListener('input', e => {
  currentColor = e.target.value;
  updateSelectedSwatch();
});

// Palette
const paletteEl = document.getElementById('palette');
PALETTE_COLORS.forEach(hex => {
  const sw = document.createElement('div');
  sw.className = 'swatch';
  sw.style.background = hex;
  sw.title = hex;
  sw.addEventListener('click', () => {
    currentColor = hex;
    document.getElementById('color-input').value = hex;
    updateSelectedSwatch();
  });
  paletteEl.appendChild(sw);
});

function updateSelectedSwatch() {
  document.querySelectorAll('.swatch').forEach(sw => {
    sw.classList.toggle('selected', sw.style.background === hexToRgbStyle(currentColor));
  });
}

function hexToRgbStyle(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${r}, ${g}, ${b})`;
}

// ─────────────────────────────────────────────
// Canvas interaction
// ─────────────────────────────────────────────
let isDrawing = false;

canvas.addEventListener('mousedown', e => {
  if (!pixelData) return;
  isDrawing = true;
  const [px, py] = getPixelCoords(e);

  if (e.button === 2) {
    // Right-click: pick color
    const idx = (py * canvasW + px) * 4;
    const r = pixelData[idx], g = pixelData[idx+1], b = pixelData[idx+2];
    currentColor = rgbToHex(r, g, b);
    document.getElementById('color-input').value = currentColor;
    updateSelectedSwatch();
    return;
  }

  pushUndo();
  if (currentTool === 'fill') floodFill(px, py, currentColor);
  else paintAt(px, py);
  redraw();
});

canvas.addEventListener('mousemove', e => {
  if (!isDrawing || !pixelData) return;
  if (currentTool === 'brush' || currentTool === 'eraser') {
    const [px, py] = getPixelCoords(e);
    paintAt(px, py);
    redraw();
  }
});

canvas.addEventListener('mouseup', () => { isDrawing = false; });
canvas.addEventListener('mouseleave', () => { isDrawing = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

function getPixelCoords(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const px = Math.floor((e.clientX - rect.left) * scaleX);
  const py = Math.floor((e.clientY - rect.top) * scaleY);
  return [
    Math.max(0, Math.min(canvasW - 1, px)),
    Math.max(0, Math.min(canvasH - 1, py))
  ];
}

// ─────────────────────────────────────────────
// Paint brush
// ─────────────────────────────────────────────
function paintAt(cx, cy) {
  const r = parseInt(currentColor.slice(1,3),16);
  const g = parseInt(currentColor.slice(3,5),16);
  const b = parseInt(currentColor.slice(5,7),16);
  const half = Math.floor(brushSize / 2);
  const isEraser = currentTool === 'eraser';

  for (let dy = -half; dy <= half; dy++) {
    for (let dx = -half; dx <= half; dx++) {
      const px = cx + dx, py = cy + dy;
      if (px < 0 || px >= canvasW || py < 0 || py >= canvasH) continue;
      const idx = (py * canvasW + px) * 4;

      // Don't paint over black outline pixels
      const oR = outlineData[idx], oG = outlineData[idx+1], oB = outlineData[idx+2];
      if (oR === 0 && oG === 0 && oB === 0) continue;

      if (isEraser) {
        pixelData[idx]   = 255;
        pixelData[idx+1] = 255;
        pixelData[idx+2] = 255;
        pixelData[idx+3] = 255;
      } else {
        pixelData[idx]   = r;
        pixelData[idx+1] = g;
        pixelData[idx+2] = b;
        pixelData[idx+3] = 255;
      }
    }
  }
}

// ─────────────────────────────────────────────
// Flood fill (BFS)
// ─────────────────────────────────────────────
function floodFill(startX, startY, hexColor) {
  const fillR = parseInt(hexColor.slice(1,3),16);
  const fillG = parseInt(hexColor.slice(3,5),16);
  const fillB = parseInt(hexColor.slice(5,7),16);

  const idx0 = (startY * canvasW + startX) * 4;
  const targetR = pixelData[idx0];
  const targetG = pixelData[idx0+1];
  const targetB = pixelData[idx0+2];

  // Same color — nothing to do
  if (targetR === fillR && targetG === fillG && targetB === fillB) return;

  // Don't fill black outline pixels
  if (targetR === 0 && targetG === 0 && targetB === 0) return;

  const visited = new Uint8Array(canvasW * canvasH);
  const stack = [startX + startY * canvasW];
  visited[startX + startY * canvasW] = 1;

  while (stack.length) {
    const pos = stack.pop();
    const x = pos % canvasW;
    const y = (pos / canvasW) | 0;
    const idx = pos * 4;

    pixelData[idx]   = fillR;
    pixelData[idx+1] = fillG;
    pixelData[idx+2] = fillB;
    pixelData[idx+3] = 255;

    // 4-connected neighbors
    for (const [nx, ny] of [[x-1,y],[x+1,y],[x,y-1],[x,y+1]]) {
      if (nx < 0 || nx >= canvasW || ny < 0 || ny >= canvasH) continue;
      const npos = nx + ny * canvasW;
      if (visited[npos]) continue;
      const nidx = npos * 4;
      const nr = pixelData[nidx], ng = pixelData[nidx+1], nb = pixelData[nidx+2];
      if (nr === targetR && ng === targetG && nb === targetB) {
        visited[npos] = 1;
        stack.push(npos);
      }
    }
  }
}

// ─────────────────────────────────────────────
// Undo
// ─────────────────────────────────────────────
function pushUndo() {
  undoStack.push(pixelData.slice());
  if (undoStack.length > MAX_UNDO) undoStack.shift();
}

function undoAction() {
  if (!undoStack.length) return;
  pixelData = undoStack.pop();
  redraw();
}

// ─────────────────────────────────────────────
// Redraw canvas from pixelData
// ─────────────────────────────────────────────
function redraw() {
  const imgData = ctx.createImageData(canvasW, canvasH);
  imgData.data.set(pixelData);
  ctx.putImageData(imgData, 0, 0);
}

// ─────────────────────────────────────────────
// Clear
// ─────────────────────────────────────────────
function clearCanvas() {
  if (!outlineData) return;
  pushUndo();
  pixelData = outlineData.slice();
  redraw();
}

// ─────────────────────────────────────────────
// Save
// ─────────────────────────────────────────────
function downloadCanvas() {
  const link = document.createElement('a');
  const name = allItems[currentPokemonId - 1]?.querySelector('.name').textContent || `pokemon-${currentPokemonId}`;
  link.download = `pixine-${name}.png`;
  link.href = canvas.toDataURL();
  link.click();
}

// ─────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────
function rgbToHex(r, g, b) {
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2,'0')).join('');
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'f' || e.key === 'F') setTool('fill');
  if (e.key === 'b' || e.key === 'B') setTool('brush');
  if (e.key === 'e' || e.key === 'E') setTool('eraser');
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undoAction(); }
});
</script>
