<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixine — Pokemon Coloring Book</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #16213e;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 2px solid #0f3460;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.4rem;
      color: #e94560;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    header h1 span { color: #fff; }

    .search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      max-width: 340px;
    }

    .search-wrap input {
      flex: 1;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid #0f3460;
      background: #0f3460;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
    }

    .search-wrap input:focus { border-color: #e94560; }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 200px;
      background: #16213e;
      border-right: 2px solid #0f3460;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      padding: 8px 10px 4px;
    }

    #pokemon-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 6px;
    }

    #pokemon-list::-webkit-scrollbar { width: 4px; }
    #pokemon-list::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }

    .poke-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 6px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.15s;
      text-transform: capitalize;
    }

    .poke-item:hover { background: #0f3460; }
    .poke-item.active { background: #e94560; color: #fff; }

    .poke-item .num {
      font-size: 0.65rem;
      color: #666;
      width: 28px;
      text-align: right;
    }

    .poke-item.active .num { color: #ffaabb; }

    /* ── Canvas area ── */
    .canvas-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: #12122a;
    }

    #canvas-wrap {
      position: relative;
      cursor: crosshair;
      image-rendering: pixelated;
    }

    #main-canvas {
      display: block;
      image-rendering: pixelated;
      border: 2px solid #0f3460;
    }

    .canvas-hint {
      position: absolute;
      bottom: 12px;
      font-size: 0.75rem;
      color: #555;
      pointer-events: none;
    }

    #loading-msg {
      position: absolute;
      font-size: 1rem;
      color: #888;
    }

    /* ── Right panel ── */
    .panel {
      width: 180px;
      background: #16213e;
      border-left: 2px solid #0f3460;
      display: flex;
      flex-direction: column;
      gap: 0;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .panel::-webkit-scrollbar { width: 4px; }
    .panel::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }

    .panel-section {
      padding: 10px;
      border-bottom: 1px solid #0f3460;
    }

    .panel-section label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 8px;
    }

    /* Tools */
    .tools {
      display: flex;
      gap: 6px;
    }

    .tool-btn {
      flex: 1;
      padding: 7px 4px;
      border: 1px solid #0f3460;
      border-radius: 6px;
      background: #0f3460;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      position: relative;
    }

    .tool-btn:hover { border-color: #e94560; color: #fff; }
    .tool-btn.active { background: #e94560; border-color: #e94560; color: #fff; }

    .tool-btn .tip {
      display: block;
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* Color picker */
    #color-input {
      width: 100%;
      height: 40px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: none;
      padding: 0;
    }

    /* Palette */
    .palette {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
    }

    .swatch {
      aspect-ratio: 1;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.1s, border-color 0.1s;
    }

    .swatch:hover { transform: scale(1.15); }
    .swatch.selected { border-color: #fff; }

    /* Brush size */
    .brush-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brush-row input[type=range] {
      flex: 1;
      accent-color: #e94560;
    }

    .brush-row span {
      font-size: 0.75rem;
      width: 20px;
      text-align: right;
      color: #aaa;
    }

    /* Action buttons */
    .action-btn {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #0f3460;
      background: #0f3460;
      color: #ccc;
      font-size: 0.8rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      margin-top: 6px;
    }

    .action-btn:first-child { margin-top: 0; }
    .action-btn:hover { border-color: #e94560; color: #fff; background: #1a2a4a; }

    .action-btn.danger:hover { background: #5a1020; border-color: #e94560; }

    /* Zoom info */
    .zoom-label {
      font-size: 0.7rem;
      color: #555;
      text-align: center;
      padding: 4px 0 0;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .sidebar { width: 130px; }
      .panel { width: 140px; }
    }

    /* ── Modals ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      padding: 20px;
      max-width: 420px;
      width: 90%;
    }

    .modal-box h2 {
      font-size: 1rem;
      color: #e94560;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .modal-box input[type=text] {
      width: 100%;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #0f3460;
      background: #0f3460;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      margin-bottom: 12px;
    }
    .modal-box input[type=text]:focus { border-color: #e94560; }

    .modal-actions { display: flex; gap: 8px; }
    .modal-actions button { flex: 1; }

    .btn-primary {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #e94560;
      background: #e94560;
      color: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #0f3460;
      background: #0f3460;
      color: #ccc;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-secondary:hover { border-color: #e94560; color: #fff; }

    /* Gallery modal */
    #gallery-modal .modal-box {
      max-width: 860px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
    }

    #gallery-modal .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      flex-shrink: 0;
    }

    #gallery-modal .modal-header h2 { margin: 0; }

    #gallery-grid {
      flex: 1;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      padding-right: 4px;
    }
    #gallery-grid::-webkit-scrollbar { width: 4px; }
    #gallery-grid::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }

    .gallery-card {
      background: #0f3460;
      border: 1px solid #1a3a6a;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }
    .gallery-card:hover { border-color: #e94560; transform: scale(1.02); }

    .gallery-card img {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      image-rendering: pixelated;
      background: #fff;
    }

    .gallery-card-info {
      padding: 6px 8px;
    }
    .gallery-card-info .poke-name {
      font-size: 0.75rem;
      color: #fff;
      text-transform: capitalize;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .gallery-card-info .author {
      font-size: 0.65rem;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gallery-empty {
      grid-column: 1 / -1;
      text-align: center;
      color: #555;
      padding: 40px;
      font-size: 0.9rem;
    }

    .gallery-status {
      font-size: 0.75rem;
      color: #888;
      text-align: center;
      padding: 6px 0 0;
      flex-shrink: 0;
    }

    .action-btn.highlight {
      border-color: #e94560;
      color: #e94560;
    }
    .action-btn.highlight:hover {
      background: #e94560;
      color: #fff;
    }
  </style>
</head>
<body>

<header>
  <h1>Pixi<span>ne</span></h1>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search Pokemon…" autocomplete="off" />
  </div>
</header>

<div class="main">

  <!-- Sidebar: Pokemon list -->
  <aside class="sidebar">
    <div class="sidebar-label">Pokemon (#1–1025)</div>
    <div id="pokemon-list"></div>
  </aside>

  <!-- Center: Canvas -->
  <section class="canvas-area">
    <div id="loading-msg">Select a Pokemon to start coloring!</div>
    <div id="canvas-wrap" style="display:none">
      <canvas id="main-canvas"></canvas>
    </div>
    <div class="canvas-hint">Click to fill • Right-click to pick color • Scroll to zoom</div>
  </section>

  <!-- Right panel: Tools -->
  <aside class="panel">

    <div class="panel-section">
      <label>Tool</label>
      <div class="tools">
        <div class="tool-btn" id="tool-fill" title="Flood fill" onclick="setTool('fill')">
          🪣<span class="tip">Fill</span>
        </div>
        <div class="tool-btn active" id="tool-brush" title="Pixel brush" onclick="setTool('brush')">
          🖌️<span class="tip">Pixel</span>
        </div>
        <div class="tool-btn" id="tool-eraser" title="Eraser" onclick="setTool('eraser')">
          ⬜<span class="tip">Erase</span>
        </div>
      </div>
    </div>


    <div class="panel-section">
      <label>Color</label>
      <input type="color" id="color-input" value="#e94560" />
    </div>

    <div class="panel-section">
      <label>Palette</label>
      <div class="palette" id="palette"></div>
    </div>

    <div class="panel-section">
      <label>Actions</label>
      <button class="action-btn highlight" onclick="shareDrawing()">↑ Share Drawing</button>
      <button class="action-btn" onclick="openGallery()">▦ Community Gallery</button>
      <button class="action-btn" onclick="downloadCanvas()">⬇ Save PNG</button>
      <button class="action-btn" onclick="undoAction()">↩ Undo</button>
      <button class="action-btn danger" onclick="clearCanvas()">✕ Clear Colors</button>
    </div>

    <div class="panel-section">
      <label>Zoom</label>
      <div class="brush-row">
        <input type="range" id="zoom-slider" min="2" max="16" value="6" />
        <span id="zoom-label">6×</span>
      </div>
    </div>

  </aside>
</div>

<!-- Share modal -->
<div class="modal-overlay" id="share-modal">
  <div class="modal-box">
    <h2>Share Drawing</h2>
    <p style="font-size:0.8rem;color:#888;margin-bottom:12px">Your colored Pokemon will be added to the public gallery for everyone to see.</p>
    <input type="text" id="share-author" placeholder="Your name (optional)" maxlength="32" />
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeShareModal()">Cancel</button>
      <button class="btn-primary" id="share-submit-btn" onclick="submitShare()">Share</button>
    </div>
    <div id="share-status" style="font-size:0.75rem;margin-top:10px;text-align:center;min-height:18px"></div>
  </div>
</div>

<!-- Gallery modal -->
<div class="modal-overlay" id="gallery-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h2>Community Gallery</h2>
      <div style="display:flex;gap:8px">
        <button class="btn-secondary" onclick="loadGallery()" style="font-size:0.75rem;padding:5px 10px">Refresh</button>
        <button class="btn-secondary" onclick="closeGallery()" style="font-size:0.75rem;padding:5px 10px">Close</button>
      </div>
    </div>
    <div id="gallery-grid"><div class="gallery-empty">Loading…</div></div>
    <div class="gallery-status" id="gallery-status"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// Supabase config
// Replace these two values with your own from https://supabase.com/dashboard/project/_/settings/api
// ─────────────────────────────────────────────
const SUPABASE_URL = 'YOUR_SUPABASE_PROJECT_URL';   // e.g. https://xxxx.supabase.co
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY'; // public anon key (safe for browsers)

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ─────────────────────────────────────────────
// Config
// ─────────────────────────────────────────────
const TOTAL_POKEMON = 1025;
const SPRITE_BASE = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/';

const PALETTE_COLORS = [
  '#ffffff','#f5f5dc','#ffe0b2','#ffcc80','#ffe082',
  '#fff176','#c5e1a5','#a5d6a7','#80cbc4','#80deea',
  '#90caf9','#ce93d8','#f48fb1','#ef9a9a','#bcaaa4',
  '#b0bec5','#ffd54f','#ff8a65','#e57373','#64b5f6',
  '#81c784','#4db6ac','#4dd0e1','#7986cb','#ba68c8',
  '#f06292','#ff7043','#ffca28','#26c6da','#42a5f5',
  '#9ccc65','#26a69a','#ab47bc','#ec407a','#ef5350',
  '#000000','#424242','#616161','#757575','#9e9e9e',
];

// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let currentTool = 'brush';
let currentColor = '#e94560';

let zoomLevel = 6;
let currentPokemonId = null;
let pixelData = null;       // Uint8ClampedArray of scaled canvas
let outlineData = null;     // original greyscale pixel data (scaled)
let paintLayer = null;      // user's painting at logical pixel resolution (sprite size)
let spriteW = 0, spriteH = 0;
let canvasW = 0, canvasH = 0;
let undoStack = [];
const MAX_UNDO = 30;

const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');

// ─────────────────────────────────────────────
// Build Pokemon list
// ─────────────────────────────────────────────
const listEl = document.getElementById('pokemon-list');
const allItems = [];

for (let i = 1; i <= TOTAL_POKEMON; i++) {
  const div = document.createElement('div');
  div.className = 'poke-item';
  div.dataset.id = i;
  div.innerHTML = `<span class="num">#${i}</span><span class="name">${pokeName(i)}</span>`;
  div.addEventListener('click', () => loadPokemon(i));
  listEl.appendChild(div);
  allItems.push(div);
}

function pokeName(id) {
  return `pokemon-${id}`;
}

// Fetch all names async and update
async function loadAllNames() {
  try {
    const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025&offset=0');
    const data = await res.json();
    data.results.forEach((p, i) => {
      const item = allItems[i];
      if (item) item.querySelector('.name').textContent = p.name;
    });
  } catch (e) {
    // silently fail — numeric names still work
  }
}

loadAllNames();

// Search
document.getElementById('search').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase().trim();
  allItems.forEach(item => {
    const name = item.querySelector('.name').textContent.toLowerCase();
    const num = item.dataset.id;
    item.style.display = (!q || name.includes(q) || num.includes(q)) ? '' : 'none';
  });
});

// ─────────────────────────────────────────────
// Load & process Pokemon sprite
// ─────────────────────────────────────────────
async function loadPokemon(id) {
  currentPokemonId = id;
  paintLayer = null; // reset paint when switching Pokemon
  undoStack = [];

  // Highlight active
  allItems.forEach(el => el.classList.toggle('active', +el.dataset.id === id));
  allItems[id - 1]?.scrollIntoView({ block: 'nearest' });

  const loadingEl = document.getElementById('loading-msg');
  const wrapEl = document.getElementById('canvas-wrap');
  loadingEl.textContent = 'Loading sprite…';
  loadingEl.style.display = '';
  wrapEl.style.display = 'none';

  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = `${SPRITE_BASE}${id}.png`;

  img.onload = () => {
    processSprite(img);
    loadingEl.style.display = 'none';
    wrapEl.style.display = '';
  };

  img.onerror = () => {
    loadingEl.textContent = `No sprite found for #${id}`;
  };
}

function processSprite(img) {
  const scale = zoomLevel;
  const sw = img.naturalWidth;
  const sh = img.naturalHeight;
  spriteW = sw;
  spriteH = sh;
  // Initialize paint layer only when loading a new Pokemon
  if (!paintLayer || paintLayer.length !== sw * sh * 4) {
    paintLayer = new Uint8ClampedArray(sw * sh * 4);
  }

  // Draw original sprite to offscreen canvas to read pixels
  const off = document.createElement('canvas');
  off.width = sw;
  off.height = sh;
  const octx = off.getContext('2d');
  octx.drawImage(img, 0, 0);
  const srcData = octx.getImageData(0, 0, sw, sh).data;

  // Convert to greyscale with black outlines:
  // transparent → white, dark pixels → black outline, colored pixels → greyscale shade
  const bwCanvas = document.createElement('canvas');
  bwCanvas.width = sw;
  bwCanvas.height = sh;
  const bwCtx = bwCanvas.getContext('2d');
  const bwImg = bwCtx.createImageData(sw, sh);
  for (let i = 0; i < srcData.length; i += 4) {
    const r = srcData[i], g = srcData[i+1], b = srcData[i+2], a = srcData[i+3];
    // Transparent pixels → white background
    if (a < 64) {
      bwImg.data[i]   = 255;
      bwImg.data[i+1] = 255;
      bwImg.data[i+2] = 255;
      bwImg.data[i+3] = 255;
    } else {
      // Luminance-weighted greyscale
      const grey = Math.round(0.299 * r + 0.587 * g + 0.114 * b);
      // Dark pixels are outlines → keep black; lighter pixels → their grey shade
      const out = grey < 85 ? 0 : grey;
      bwImg.data[i]   = out;
      bwImg.data[i+1] = out;
      bwImg.data[i+2] = out;
      bwImg.data[i+3] = 255;
    }
  }
  bwCtx.putImageData(bwImg, 0, 0);

  // Scale up to display canvas
  canvasW = sw * scale;
  canvasH = sh * scale;
  canvas.width = canvasW;
  canvas.height = canvasH;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(bwCanvas, 0, 0, canvasW, canvasH);

  // Store pixel data
  pixelData = ctx.getImageData(0, 0, canvasW, canvasH).data.slice();
  outlineData = pixelData.slice(); // keep original greyscale

  // Reapply the user's paint layer after zoom change
  applyPaintLayer();
  redraw();
}

// Stamp the logical-resolution paint layer onto the canvas-resolution pixelData
function applyPaintLayer() {
  for (let ly = 0; ly < spriteH; ly++) {
    for (let lx = 0; lx < spriteW; lx++) {
      const li = (ly * spriteW + lx) * 4;
      if (paintLayer[li + 3] === 0) continue; // this logical pixel wasn't painted
      for (let dy = 0; dy < zoomLevel; dy++) {
        for (let dx = 0; dx < zoomLevel; dx++) {
          const cx = lx * zoomLevel + dx;
          const cy = ly * zoomLevel + dy;
          if (cx >= canvasW || cy >= canvasH) continue;
          const idx = (cy * canvasW + cx) * 4;
          if (outlineData[idx] === 0) continue; // don't paint over outlines
          pixelData[idx]   = paintLayer[li];
          pixelData[idx+1] = paintLayer[li+1];
          pixelData[idx+2] = paintLayer[li+2];
          pixelData[idx+3] = 255;
        }
      }
    }
  }
}

// ─────────────────────────────────────────────
// Tools
// ─────────────────────────────────────────────
function setTool(name) {
  currentTool = name;
  ['fill','brush','eraser'].forEach(t => {
    document.getElementById(`tool-${t}`).classList.toggle('active', t === name);
  });
}

// Zoom
document.getElementById('zoom-slider').addEventListener('input', e => {
  zoomLevel = +e.target.value;
  document.getElementById('zoom-label').textContent = zoomLevel + '×';
  if (currentPokemonId) {
    // Reload with new zoom
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.src = `${SPRITE_BASE}${currentPokemonId}.png`;
    img.onload = () => processSprite(img);
  }
});

// Scroll to zoom
document.getElementById('canvas-wrap').addEventListener('wheel', (e) => {
  e.preventDefault();
  const slider = document.getElementById('zoom-slider');
  const delta = e.deltaY < 0 ? 1 : -1;
  slider.value = Math.max(2, Math.min(16, +slider.value + delta));
  slider.dispatchEvent(new Event('input'));
}, { passive: false });

// Color picker
document.getElementById('color-input').addEventListener('input', e => {
  currentColor = e.target.value;
  updateSelectedSwatch();
});

// Palette
const paletteEl = document.getElementById('palette');
PALETTE_COLORS.forEach(hex => {
  const sw = document.createElement('div');
  sw.className = 'swatch';
  sw.style.background = hex;
  sw.title = hex;
  sw.addEventListener('click', () => {
    currentColor = hex;
    document.getElementById('color-input').value = hex;
    updateSelectedSwatch();
  });
  paletteEl.appendChild(sw);
});

function updateSelectedSwatch() {
  document.querySelectorAll('.swatch').forEach(sw => {
    sw.classList.toggle('selected', sw.style.background === hexToRgbStyle(currentColor));
  });
}

function hexToRgbStyle(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${r}, ${g}, ${b})`;
}

// ─────────────────────────────────────────────
// Canvas interaction
// ─────────────────────────────────────────────
let isDrawing = false;

canvas.addEventListener('mousedown', e => {
  if (!pixelData) return;
  isDrawing = true;

  if (e.button === 2) {
    // Right-click: pick color from logical pixel
    const [lx, ly] = getLogicalCoords(e);
    const cx = lx * zoomLevel, cy = ly * zoomLevel;
    const idx = (cy * canvasW + cx) * 4;
    currentColor = rgbToHex(pixelData[idx], pixelData[idx+1], pixelData[idx+2]);
    document.getElementById('color-input').value = currentColor;
    updateSelectedSwatch();
    return;
  }

  pushUndo();
  if (currentTool === 'fill') {
    const [px, py] = getCanvasCoords(e);
    floodFill(px, py, currentColor);
  } else {
    paintLogicalPixel(...getLogicalCoords(e));
  }
  redraw();
});

canvas.addEventListener('mousemove', e => {
  if (!isDrawing || !pixelData) return;
  if (currentTool === 'brush' || currentTool === 'eraser') {
    paintLogicalPixel(...getLogicalCoords(e));
    redraw();
  }
});

canvas.addEventListener('mouseup', () => { isDrawing = false; });
canvas.addEventListener('mouseleave', () => { isDrawing = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// Returns raw canvas pixel coords (for flood fill)
function getCanvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  const px = Math.floor((e.clientX - rect.left) * (canvasW / rect.width));
  const py = Math.floor((e.clientY - rect.top)  * (canvasH / rect.height));
  return [Math.max(0, Math.min(canvasW-1, px)), Math.max(0, Math.min(canvasH-1, py))];
}

// Returns logical sprite pixel coords (snapped to zoom grid)
function getLogicalCoords(e) {
  const [cx, cy] = getCanvasCoords(e);
  const lx = Math.floor(cx / zoomLevel);
  const ly = Math.floor(cy / zoomLevel);
  const maxLX = Math.ceil(canvasW / zoomLevel) - 1;
  const maxLY = Math.ceil(canvasH / zoomLevel) - 1;
  return [Math.max(0, Math.min(maxLX, lx)), Math.max(0, Math.min(maxLY, ly))];
}

// ─────────────────────────────────────────────
// Paint one logical sprite pixel (fills the full zoom block)
// ─────────────────────────────────────────────
function paintLogicalPixel(lx, ly) {
  const r = parseInt(currentColor.slice(1,3),16);
  const g = parseInt(currentColor.slice(3,5),16);
  const b = parseInt(currentColor.slice(5,7),16);
  const isEraser = currentTool === 'eraser';

  // Update the logical paint layer
  const li = (ly * spriteW + lx) * 4;
  if (isEraser) {
    paintLayer[li+3] = 0; // mark as unpainted
  } else {
    paintLayer[li]   = r;
    paintLayer[li+1] = g;
    paintLayer[li+2] = b;
    paintLayer[li+3] = 255;
  }

  // Apply to the canvas-resolution pixelData
  for (let dy = 0; dy < zoomLevel; dy++) {
    for (let dx = 0; dx < zoomLevel; dx++) {
      const cx = lx * zoomLevel + dx;
      const cy = ly * zoomLevel + dy;
      if (cx >= canvasW || cy >= canvasH) continue;
      const idx = (cy * canvasW + cx) * 4;

      // Don't paint over black outline pixels
      if (outlineData[idx] === 0) continue;

      if (isEraser) {
        // Restore original greyscale — can't erase the Pokemon itself
        pixelData[idx]   = outlineData[idx];
        pixelData[idx+1] = outlineData[idx+1];
        pixelData[idx+2] = outlineData[idx+2];
        pixelData[idx+3] = outlineData[idx+3];
      } else {
        pixelData[idx]   = r;
        pixelData[idx+1] = g;
        pixelData[idx+2] = b;
        pixelData[idx+3] = 255;
      }
    }
  }
}

// ─────────────────────────────────────────────
// Flood fill (BFS)
// ─────────────────────────────────────────────
function floodFill(startX, startY, hexColor) {
  const fillR = parseInt(hexColor.slice(1,3),16);
  const fillG = parseInt(hexColor.slice(3,5),16);
  const fillB = parseInt(hexColor.slice(5,7),16);

  const idx0 = (startY * canvasW + startX) * 4;
  const targetR = pixelData[idx0];
  const targetG = pixelData[idx0+1];
  const targetB = pixelData[idx0+2];

  // Same color — nothing to do
  if (targetR === fillR && targetG === fillG && targetB === fillB) return;

  // Don't fill black outline pixels
  if (targetR === 0 && targetG === 0 && targetB === 0) return;

  const visited = new Uint8Array(canvasW * canvasH);
  const stack = [startX + startY * canvasW];
  visited[startX + startY * canvasW] = 1;

  while (stack.length) {
    const pos = stack.pop();
    const x = pos % canvasW;
    const y = (pos / canvasW) | 0;
    const idx = pos * 4;

    pixelData[idx]   = fillR;
    pixelData[idx+1] = fillG;
    pixelData[idx+2] = fillB;
    pixelData[idx+3] = 255;

    // 4-connected neighbors
    for (const [nx, ny] of [[x-1,y],[x+1,y],[x,y-1],[x,y+1]]) {
      if (nx < 0 || nx >= canvasW || ny < 0 || ny >= canvasH) continue;
      const npos = nx + ny * canvasW;
      if (visited[npos]) continue;
      const nidx = npos * 4;
      const nr = pixelData[nidx], ng = pixelData[nidx+1], nb = pixelData[nidx+2];
      if (nr === targetR && ng === targetG && nb === targetB) {
        visited[npos] = 1;
        stack.push(npos);
      }
    }
  }
}

// ─────────────────────────────────────────────
// Undo
// ─────────────────────────────────────────────
function pushUndo() {
  undoStack.push({ pixelData: pixelData.slice(), paintLayer: paintLayer.slice() });
  if (undoStack.length > MAX_UNDO) undoStack.shift();
}

function undoAction() {
  if (!undoStack.length) return;
  const state = undoStack.pop();
  pixelData = state.pixelData;
  paintLayer = state.paintLayer;
  redraw();
}

// ─────────────────────────────────────────────
// Redraw canvas from pixelData
// ─────────────────────────────────────────────
function redraw() {
  const imgData = ctx.createImageData(canvasW, canvasH);
  imgData.data.set(pixelData);
  ctx.putImageData(imgData, 0, 0);
}

// ─────────────────────────────────────────────
// Clear
// ─────────────────────────────────────────────
function clearCanvas() {
  if (!outlineData) return;
  pushUndo();
  pixelData = outlineData.slice();
  paintLayer = new Uint8ClampedArray(spriteW * spriteH * 4);
  redraw();
}

// ─────────────────────────────────────────────
// Save
// ─────────────────────────────────────────────
function downloadCanvas() {
  const link = document.createElement('a');
  const name = allItems[currentPokemonId - 1]?.querySelector('.name').textContent || `pokemon-${currentPokemonId}`;
  link.download = `pixine-${name}.png`;
  link.href = canvas.toDataURL();
  link.click();
}

// ─────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────
function rgbToHex(r, g, b) {
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2,'0')).join('');
}

// ─────────────────────────────────────────────
// Export canvas at 4× sprite size (crisp, small)
// ─────────────────────────────────────────────
function getExportDataUrl() {
  const EXPORT_ZOOM = 4;
  const exportW = spriteW * EXPORT_ZOOM;
  const exportH = spriteH * EXPORT_ZOOM;

  // Put current pixelData into a temp canvas at the current zoom size
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = canvasW;
  tmpCanvas.height = canvasH;
  const tmpCtx = tmpCanvas.getContext('2d');
  const imgData = tmpCtx.createImageData(canvasW, canvasH);
  imgData.data.set(pixelData);
  tmpCtx.putImageData(imgData, 0, 0);

  // Scale to export size (pixel-perfect)
  const exportCanvas = document.createElement('canvas');
  exportCanvas.width = exportW;
  exportCanvas.height = exportH;
  const exportCtx = exportCanvas.getContext('2d');
  exportCtx.imageSmoothingEnabled = false;
  exportCtx.drawImage(tmpCanvas, 0, 0, exportW, exportH);
  return exportCanvas.toDataURL('image/png');
}

// ─────────────────────────────────────────────
// Share
// ─────────────────────────────────────────────
function shareDrawing() {
  if (!currentPokemonId) {
    alert('Select and color a Pokemon first!');
    return;
  }
  document.getElementById('share-author').value = '';
  document.getElementById('share-status').textContent = '';
  document.getElementById('share-submit-btn').disabled = false;
  document.getElementById('share-modal').classList.add('open');
}

function closeShareModal() {
  document.getElementById('share-modal').classList.remove('open');
}

async function submitShare() {
  const btn = document.getElementById('share-submit-btn');
  const statusEl = document.getElementById('share-status');
  const author = document.getElementById('share-author').value.trim() || 'Anonymous';
  const pokemonName = allItems[currentPokemonId - 1]?.querySelector('.name').textContent || `#${currentPokemonId}`;

  btn.disabled = true;
  statusEl.style.color = '#888';
  statusEl.textContent = 'Uploading…';

  try {
    const imageData = getExportDataUrl();
    const { error } = await db.from('drawings').insert({
      pokemon_id: currentPokemonId,
      pokemon_name: pokemonName,
      image_data: imageData,
      author_name: author,
    });

    if (error) throw error;

    statusEl.style.color = '#4caf50';
    statusEl.textContent = 'Shared! Find it in the Community Gallery.';
    setTimeout(closeShareModal, 1800);
  } catch (err) {
    statusEl.style.color = '#e94560';
    statusEl.textContent = 'Error: ' + (err.message || 'Could not upload. Check your Supabase config.');
    btn.disabled = false;
  }
}

// ─────────────────────────────────────────────
// Gallery
// ─────────────────────────────────────────────
function openGallery() {
  document.getElementById('gallery-modal').classList.add('open');
  loadGallery();
}

function closeGallery() {
  document.getElementById('gallery-modal').classList.remove('open');
}

async function loadGallery() {
  const grid = document.getElementById('gallery-grid');
  const statusEl = document.getElementById('gallery-status');
  grid.innerHTML = '<div class="gallery-empty">Loading…</div>';
  statusEl.textContent = '';

  try {
    const { data, error } = await db
      .from('drawings')
      .select('id, pokemon_name, image_data, author_name, created_at')
      .order('created_at', { ascending: false })
      .limit(100);

    if (error) throw error;

    if (!data || data.length === 0) {
      grid.innerHTML = '<div class="gallery-empty">No drawings yet — be the first to share one!</div>';
      return;
    }

    grid.innerHTML = '';
    data.forEach(row => {
      const card = document.createElement('div');
      card.className = 'gallery-card';
      const date = new Date(row.created_at).toLocaleDateString();
      card.innerHTML = `
        <img src="${row.image_data}" alt="${row.pokemon_name}" loading="lazy" />
        <div class="gallery-card-info">
          <div class="poke-name">${row.pokemon_name}</div>
          <div class="author">by ${row.author_name || 'Anonymous'} · ${date}</div>
        </div>`;
      grid.appendChild(card);
    });

    statusEl.textContent = `${data.length} drawing${data.length !== 1 ? 's' : ''} shared`;
  } catch (err) {
    grid.innerHTML = `<div class="gallery-empty" style="color:#e94560">Error loading gallery: ${err.message || 'Check your Supabase config.'}</div>`;
  }
}

// Close modals on overlay click
document.getElementById('share-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeShareModal();
});
document.getElementById('gallery-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeGallery();
});

// ─────────────────────────────────────────────
// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'f' || e.key === 'F') setTool('fill');
  if (e.key === 'b' || e.key === 'B') setTool('brush');
  if (e.key === 'e' || e.key === 'E') setTool('eraser');
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undoAction(); }
});
</script>
